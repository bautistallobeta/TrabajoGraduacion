openapi: 3.0.3
info:
  title: MSTF - Microservicio de Transacciones Financieras
  description: |
    API REST para gestión de cuentas y transferencias financieras sobre TigerBeetle como ledger y MySQL para datos administrativos.

    **Autenticación:** la mayoría de los endpoints requieren credenciales. Se aceptan dos esquemas:
    - `Bearer <token>` — actor USUARIO (token de sesión obtenido en `/usuarios/login`)
    - `X-API-Key: <apikey>` — actor SISTEMA

    Endpoints públicos (sin autenticación): `GET /ping`, `POST /usuarios/login`
  version: 1.0.0
  contact:
    name: Bautista José Llobeta

servers:
  - url: http://localhost:8080
    description: Desarrollo local

tags:
  - name: Health
  - name: Transferencias
  - name: Cuentas
  - name: Monedas
  - name: Parámetros
  - name: Usuarios

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Token de sesión obtenido en POST /usuarios/login
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key para actores SISTEMA

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "mensaje de error descriptivo"

    Cuenta:
      type: object
      properties:
        IdCuenta:
          type: string
          description: ID compuesto (Uint128 decimal)
          example: "1000000000012345"
        IdUsuarioFinal:
          type: integer
          example: 12345
        IdMoneda:
          type: integer
          example: 1
        Creditos:
          type: string
          description: Créditos posteados (con decimales)
          example: "500.00"
        Debitos:
          type: string
          description: Débitos posteados (con decimales)
          example: "200.00"
        Estado:
          type: string
          enum: [A, I]
          description: A=Activa, I=Inactiva
          example: "A"
        Fecha:
          type: string
          description: Fecha de alta ingresada al crear la cuenta
          example: "2025-01-15"
        FechaProceso:
          type: string
          description: Timestamp de registro en TigerBeetle (nanosegundos)
          example: "2025-01-15 10:30:00.123456789"

    Transferencia:
      type: object
      properties:
        IdTransferencia:
          type: string
          example: "98765432100000000001"
        IdCuentaDebito:
          type: string
          example: "1000000000012345"
        IdCuentaCredito:
          type: string
          example: "1000000000000000"
        IdUsuarioFinal:
          type: integer
          example: 12345
        IdMoneda:
          type: integer
          example: 1
        Monto:
          type: string
          description: Monto con dos decimales
          example: "150.00"
        Tipo:
          type: string
          enum: [I, E, R]
          description: I=Ingreso, E=Egreso, R=Reversión
          example: "I"
        Categoria:
          type: integer
          example: 10
        Fecha:
          type: string
          description: Fecha de negocio
          example: "2025-01-15"
        FechaProceso:
          type: string
          description: Timestamp de procesamiento en TigerBeetle
          example: "2025-01-15 10:30:00.123456789"
        Estado:
          type: string
          enum: [F, R]
          description: F=Finalizada, R=Revertida
          example: "F"
        IdTransferenciaOriginal:
          type: string
          description: Solo presente en reversiones
          example: "98765432100000000001"

    Moneda:
      type: object
      properties:
        IdMoneda:
          type: integer
          example: 1
        IdCuentaEmpresa:
          type: string
          description: ID de la cuenta empresa en TigerBeetle para este ledger
          example: "1000000000000000"
        Estado:
          type: string
          enum: [A, I]
          example: "A"
        FechaAlta:
          type: string
          example: "2025-01-01T00:00:00Z"

    Parametro:
      type: object
      properties:
        Parametro:
          type: string
          example: "LIMITEBUSCARCUENTAS"
        Valor:
          type: string
          example: "100"
        Descripcion:
          type: string
          example: "Límite por defecto para búsqueda de cuentas"
        EsModificable:
          type: string
          enum: [S, N]
          example: "S"

    Usuario:
      type: object
      properties:
        IdUsuario:
          type: integer
          example: 7
        Usuario:
          type: string
          example: "juan.perez"
        Estado:
          type: string
          enum: [P, A, I]
          description: P=Pendiente, A=Activo, I=Inactivo
          example: "A"
        FechaAlta:
          type: string
          example: "2025-01-10"
        TokenSesion:
          type: string
          example: "abc123token"

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:

  # ── HEALTH ─────────────────────────────────────────────────────────────────

  /ping:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        '200':
          description: Servicio activo
          content:
            text/plain:
              schema:
                type: string
                example: "pong"

  # ── TRANSFERENCIAS ─────────────────────────────────────────────────────────

  /transferencias/{idtransferencia}:
    get:
      tags: [Transferencias]
      summary: Obtener transferencia por ID
      parameters:
        - name: idtransferencia
          in: path
          required: true
          description: ID de la transferencia (Uint128 decimal string)
          schema:
            type: string
          example: "98765432100000000001"
      responses:
        '200':
          description: Transferencia encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transferencia'
        '400':
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /transferencias:
    get:
      tags: [Transferencias]
      summary: Buscar transferencias con filtros
      description: |
        Si se envía `IdsTransferencia` (parámetro repetido), hace lookup directo ignorando el resto de filtros.
        De lo contrario aplica los filtros disponibles.
        `FechaDesde`/`FechaHasta` filtran por timestamp de procesamiento en TigerBeetle, no por fecha de negocio.
      parameters:
        - name: IdsTransferencia
          in: query
          description: "IDs para lookup directo. Parámetro repetido: ?IdsTransferencia=1&IdsTransferencia=2"
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: IdUsuarioFinal
          in: query
          schema:
            type: integer
          description: "0 o vacío = sin filtro"
        - name: IdCategoria
          in: query
          schema:
            type: integer
          description: "0 o vacío = sin filtro"
        - name: IdMoneda
          in: query
          schema:
            type: integer
          description: "0 o vacío = sin filtro"
        - name: Estado
          in: query
          schema:
            type: string
            enum: [F, R, '']
          description: "F=Finalizada, R=Revertida, vacío=sin filtro"
        - name: MontoMin
          in: query
          schema:
            type: number
          description: "Monto mínimo decimal inclusive. 0 o vacío = sin filtro"
          example: 10.50
        - name: MontoMax
          in: query
          schema:
            type: number
          description: "Monto máximo decimal inclusive. 0 o vacío = sin filtro"
          example: 500.00
        - name: FechaDesde
          in: query
          schema:
            type: string
          description: "Formatos: YYYY-MM-DD, YYYY-MM-DD HH:MM:SS, RFC3339"
          example: "2025-01-01"
        - name: FechaHasta
          in: query
          schema:
            type: string
          example: "2025-12-31"
        - name: Limite
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Resultado (puede ser vacío)
          content:
            application/json:
              schema:
                type: object
                properties:
                  Total:
                    type: integer
                    example: 2
                  Transferencias:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transferencia'
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Transferencias]
      summary: "Crear transferencia — SOLO PARA PRUEBAS"
      description: |
        **Este endpoint existe únicamente para probar el microservicio.**
        Publica un mensaje en Kafka para que el consumidor lo procese de forma asíncrona.
        Retorna 202 inmediatamente; el resultado real llega vía Webhook al completarse el lote.

        Tipos:
        - `I` — Ingreso (empresa → usuario)
        - `E` — Egreso (usuario → empresa)
        - `R` — Reversión (requiere `IdTransferencia` de la transfer original, `Monto` puede ser 0)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [IdTransferencia, IdUsuarioFinal, IdMoneda, Tipo, IdCategoria, Fecha]
              properties:
                IdTransferencia:
                  type: string
                  description: ID único (Uint128 decimal string)
                  example: "98765432100000000001"
                IdUsuarioFinal:
                  type: integer
                  example: 12345
                Monto:
                  type: number
                  description: Decimal. Requerido y > 0 para Tipo I o E.
                  example: 150.50
                IdMoneda:
                  type: integer
                  example: 1
                Tipo:
                  type: string
                  enum: [I, E, R]
                  example: "I"
                IdCategoria:
                  type: integer
                  example: 10
                Fecha:
                  type: string
                  description: Fecha de negocio
                  example: "2025-06-15"
            example:
              IdTransferencia: "98765432100000000001"
              IdUsuarioFinal: 12345
              Monto: 150.50
              IdMoneda: 1
              Tipo: "I"
              IdCategoria: 10
              Fecha: "2025-06-15"
      responses:
        '202':
          description: Encolada en Kafka
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "Transferencia aceptada y encolada en Kafka."
                  Id:
                    type: string
                    example: "98765432100000000001"
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error publicando en Kafka
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── CUENTAS ────────────────────────────────────────────────────────────────

  /cuentas/{idusuariofinal}/{idmoneda}:
    get:
      tags: [Cuentas]
      summary: Obtener cuenta de un usuario en una moneda
      parameters:
        - name: idusuariofinal
          in: path
          required: true
          schema:
            type: integer
          example: 12345
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Cuenta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cuenta'
        '400':
          description: Parámetros inválidos o cuenta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cuentas/{idusuariofinal}/{idmoneda}/historial:
    get:
      tags: [Cuentas]
      summary: Historial de balances de la cuenta
      description: Devuelve el balance de la cuenta en cada momento en que fue afectada por una transferencia.
      parameters:
        - name: idusuariofinal
          in: path
          required: true
          schema:
            type: integer
          example: 12345
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
        - name: TimeStampMin
          in: query
          schema:
            type: integer
          description: Timestamp mínimo en nanosegundos. 0 o vacío = sin filtro.
          example: 1735689600000000000
        - name: TimeStampMax
          in: query
          schema:
            type: integer
          description: Timestamp máximo en nanosegundos. 0 o vacío = sin filtro.
          example: 1767225600000000000
        - name: Limite
          in: query
          schema:
            type: integer
            default: 0
          description: Máximo de registros. 0 = sin límite.
      responses:
        '200':
          description: Historial obtenido
          content:
            application/json:
              schema:
                type: object
                properties:
                  IdUsuarioFinal:
                    type: integer
                    example: 12345
                  IdMoneda:
                    type: integer
                    example: 1
                  Total:
                    type: integer
                    example: 3
                  Historial:
                    type: array
                    items:
                      type: object
                      properties:
                        Debitos:
                          type: string
                          example: "100.00"
                        Creditos:
                          type: string
                          example: "500.00"
                        Balance:
                          type: string
                          example: "400.00"
                        Timestamp:
                          type: integer
                          example: 1735689600123456789
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cuentas/{idusuariofinal}/{idmoneda}/transferencias:
    get:
      tags: [Cuentas]
      summary: Transferencias de la cuenta
      description: Devuelve las transferencias asociadas a la cuenta. Excluye las de cierre internas.
      parameters:
        - name: idusuariofinal
          in: path
          required: true
          schema:
            type: integer
          example: 12345
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
        - name: TimestampMin
          in: query
          schema:
            type: integer
          description: Timestamp mínimo en nanosegundos. 0 o vacío = sin filtro.
        - name: TimestampMax
          in: query
          schema:
            type: integer
          description: Timestamp máximo en nanosegundos. 0 o vacío = sin filtro.
        - name: Limite
          in: query
          schema:
            type: integer
            default: 0
          description: Máximo de registros. 0 = sin límite.
      responses:
        '200':
          description: Transferencias de la cuenta
          content:
            application/json:
              schema:
                type: object
                properties:
                  Total:
                    type: integer
                    example: 5
                  Transferencias:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transferencia'
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cuentas:
    post:
      tags: [Cuentas]
      summary: Crear cuenta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [IdUsuarioFinal, IdMoneda, Fecha]
              properties:
                IdUsuarioFinal:
                  type: integer
                  example: 12345
                IdMoneda:
                  type: integer
                  example: 1
                Fecha:
                  type: string
                  description: Fecha de alta
                  example: "2025-06-15"
            example:
              IdUsuarioFinal: 12345
              IdMoneda: 1
              Fecha: "2025-06-15"
      responses:
        '201':
          description: Cuenta creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "Cuenta creada exitosamente"
        '200':
          description: Cuenta ya existía
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "Cuenta ya existente"
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Error al crear en TigerBeetle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Cuentas]
      summary: Buscar cuentas con filtros
      description: |
        **Modo lookup directo:** si se envían `IdsUsuarioFinal` e `IdsMoneda` (arrays paralelos del mismo tamaño),
        hace lookup por esos pares ignorando el resto de filtros.

        **Modo filtrado:** usa `IdUsuarioFinal`, `IdMoneda`, `Estado` y `Limite`.
      parameters:
        - name: IdsUsuarioFinal
          in: query
          description: "Array de IDs de usuario. Debe tener la misma cantidad que IdsMoneda. ?IdsUsuarioFinal=1&IdsUsuarioFinal=2"
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: IdsMoneda
          in: query
          description: "Array de IDs de moneda, paralelo a IdsUsuarioFinal. ?IdsMoneda=1&IdsMoneda=1"
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: IdUsuarioFinal
          in: query
          schema:
            type: integer
          description: "0 o vacío = sin filtro"
        - name: IdMoneda
          in: query
          schema:
            type: integer
          description: "0 o vacío = sin filtro"
        - name: Estado
          in: query
          schema:
            type: string
            enum: [A, I, '']
          description: "A=Activa, I=Inactiva, vacío=sin filtro"
        - name: Limite
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Resultado (puede ser vacío)
          content:
            application/json:
              schema:
                type: object
                properties:
                  Total:
                    type: integer
                    example: 2
                  Cuentas:
                    type: array
                    items:
                      $ref: '#/components/schemas/Cuenta'
        '400':
          description: Parámetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cuentas/{idusuariofinal}/{idmoneda}/desactivar:
    put:
      tags: [Cuentas]
      summary: Desactivar cuenta
      description: Cierra la cuenta en TigerBeetle (flag Closed). Requiere saldo cero.
      parameters:
        - name: idusuariofinal
          in: path
          required: true
          schema:
            type: integer
          example: 12345
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Cuenta desactivada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "Cuenta desactivada exitosamente"
        '400':
          description: Error al desactivar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cuentas/{idusuariofinal}/{idmoneda}/activar:
    put:
      tags: [Cuentas]
      summary: Activar cuenta
      description: Reactiva una cuenta previamente cerrada en TigerBeetle.
      parameters:
        - name: idusuariofinal
          in: path
          required: true
          schema:
            type: integer
          example: 12345
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Cuenta activada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "Cuenta activada exitosamente"
        '400':
          description: Error al activar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── MONEDAS ────────────────────────────────────────────────────────────────

  /monedas/{idmoneda}:
    get:
      tags: [Monedas]
      summary: Obtener moneda por ID
      parameters:
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Moneda encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Moneda'
        '404':
          description: No encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Monedas]
      summary: Borrar moneda
      parameters:
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Moneda borrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error al borrar (ej. moneda no está en estado Inactivo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Moneda no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Conflicto — existen cuentas de usuario asociadas a la moneda
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /monedas:
    get:
      tags: [Monedas]
      summary: Listar monedas
      parameters:
        - name: IncluyeInactivos
          in: query
          schema:
            type: string
            enum: [S, N]
            default: N
          description: "S=incluye inactivas, N=solo activas"
      responses:
        '200':
          description: Lista de monedas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Moneda'
        '400':
          description: Parámetro inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Monedas]
      summary: Crear moneda
      description: |
        Crea la moneda en MySQL, crea la cuenta empresa en TigerBeetle y la activa.
        Si algún paso falla se realiza rollback automático.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [IdMoneda]
              properties:
                IdMoneda:
                  type: integer
                  example: 2
            example:
              IdMoneda: 2
      responses:
        '201':
          description: Moneda creada y activada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Datos inválidos o error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /monedas/{idmoneda}/desactivar:
    put:
      tags: [Monedas]
      summary: Desactivar moneda
      parameters:
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Moneda desactivada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /monedas/{idmoneda}/activar:
    put:
      tags: [Monedas]
      summary: Activar moneda
      parameters:
        - name: idmoneda
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Moneda activada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── PARÁMETROS ─────────────────────────────────────────────────────────────

  /parametros/{parametro}:
    get:
      tags: [Parámetros]
      summary: Obtener parámetro por clave
      parameters:
        - name: parametro
          in: path
          required: true
          schema:
            type: string
          example: "LIMITEBUSCARCUENTAS"
      responses:
        '200':
          description: Parámetro encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Parametro'
        '404':
          description: No encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Parámetros]
      summary: Modificar valor de un parámetro
      description: Solo modifica parámetros con `EsModificable = S`.
      parameters:
        - name: parametro
          in: path
          required: true
          schema:
            type: string
          example: "LIMITEBUSCARCUENTAS"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Valor]
              properties:
                Valor:
                  type: string
                  example: "200"
            example:
              Valor: "200"
      responses:
        '200':
          description: Parámetro modificado
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /parametros:
    get:
      tags: [Parámetros]
      summary: Buscar parámetros
      parameters:
        - name: Cadena
          in: query
          schema:
            type: string
          description: Texto de búsqueda en el nombre del parámetro. Vacío = todos.
          example: "LIMITE"
      responses:
        '200':
          description: Lista de parámetros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Parametro'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── USUARIOS ───────────────────────────────────────────────────────────────

  /usuarios/{idusuario}:
    get:
      tags: [Usuarios]
      summary: Obtener usuario por ID
      parameters:
        - name: idusuario
          in: path
          required: true
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
                  Usuario:
                    $ref: '#/components/schemas/Usuario'
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Usuarios]
      summary: Borrar usuario
      parameters:
        - name: idusuario
          in: path
          required: true
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: Usuario borrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios:
    get:
      tags: [Usuarios]
      summary: Buscar usuarios
      parameters:
        - name: cadena
          in: query
          schema:
            type: string
          description: Texto de búsqueda en el nombre de usuario. Vacío = todos.
          example: "juan"
        - name: incluyeInactivos
          in: query
          schema:
            type: string
            enum: [S, N]
            default: N
          description: "S=incluye inactivos y pendientes, N=solo activos"
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '400':
          description: Parámetro inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Usuarios]
      summary: Crear usuario
      description: Crea el usuario en estado Pendiente (P). Se genera una contraseña temporal que debe ser cambiada al confirmar la cuenta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Usuario]
              properties:
                Usuario:
                  type: string
                  example: "juan.perez"
            example:
              Usuario: "juan.perez"
      responses:
        '200':
          description: Usuario creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  Id:
                    type: integer
                    example: 7
                  PasswordTemporal:
                    type: string
                    example: "Ab3x!9Qz"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/login:
    post:
      tags: [Usuarios]
      summary: Login de usuario
      security: []
      description: Autentica al usuario y devuelve un token de sesión para usar como Bearer token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Usuario, Password]
              properties:
                Usuario:
                  type: string
                  example: "juan.perez"
                Password:
                  type: string
                  description: Contraseña en texto plano (el sistema aplica MD5 internamente)
                  example: "MiPassword123!"
            example:
              Usuario: "juan.perez"
              Password: "MiPassword123!"
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
                  TokenSesion:
                    type: string
                    example: "eyJhbGci..."
        '400':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/activar/{idusuario}:
    put:
      tags: [Usuarios]
      summary: Activar usuario
      description: Cambia el estado del usuario de Inactivo (I) a Activo (A).
      parameters:
        - name: idusuario
          in: path
          required: true
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: Usuario activado
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/desactivar/{idusuario}:
    put:
      tags: [Usuarios]
      summary: Desactivar usuario
      description: Cambia el estado del usuario de Activo (A) a Inactivo (I).
      parameters:
        - name: idusuario
          in: path
          required: true
          schema:
            type: integer
          example: 7
      responses:
        '200':
          description: Usuario desactivado
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/confirmar-cuenta/{idusuario}:
    put:
      tags: [Usuarios]
      summary: Confirmar cuenta de usuario
      description: |
        Permite al usuario Pendiente (P) establecer su contraseña definitiva y activarse.
        **Requiere el Bearer token de sesión temporal obtenido al hacer login con la contraseña temporal.**
      parameters:
        - name: idusuario
          in: path
          required: true
          schema:
            type: integer
          example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [Password, ConfirmarPassword]
              properties:
                Password:
                  type: string
                  description: Nueva contraseña en texto plano
                  example: "NuevaPassword123!"
                ConfirmarPassword:
                  type: string
                  example: "NuevaPassword123!"
            example:
              Password: "NuevaPassword123!"
              ConfirmarPassword: "NuevaPassword123!"
      responses:
        '200':
          description: Cuenta confirmada y activada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio o contraseñas no coinciden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token de sesión ausente o inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/password/modificar:
    put:
      tags: [Usuarios]
      summary: Modificar contraseña del usuario autenticado
      description: El usuario autenticado (Bearer token) cambia su propia contraseña.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [PasswordAnterior, PasswordNuevo, ConfirmarPassword]
              properties:
                PasswordAnterior:
                  type: string
                  example: "PasswordActual123!"
                PasswordNuevo:
                  type: string
                  example: "PasswordNuevo456!"
                ConfirmarPassword:
                  type: string
                  example: "PasswordNuevo456!"
            example:
              PasswordAnterior: "PasswordActual123!"
              PasswordNuevo: "PasswordNuevo456!"
              ConfirmarPassword: "PasswordNuevo456!"
      responses:
        '200':
          description: Contraseña modificada
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '400':
          description: Error de negocio o validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/password/reestablecer:
    put:
      tags: [Usuarios]
      summary: Restablecer contraseña de un usuario
      description: Genera una nueva contraseña temporal para el usuario indicado. El usuario deberá confirmar su cuenta nuevamente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [IdUsuario]
              properties:
                IdUsuario:
                  type: integer
                  example: 7
            example:
              IdUsuario: 7
      responses:
        '200':
          description: Contraseña restablecida
          content:
            application/json:
              schema:
                type: object
                properties:
                  PasswordTemporal:
                    type: string
                    example: "Zq7!mNx2"
        '400':
          description: Error de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /usuarios/logout:
    post:
      tags: [Usuarios]
      summary: Logout de usuario
      description: |
        Cierra la sesión activa del usuario autenticado.
        Invalida el token actual rotándolo a un valor nuevo desconocido para el cliente;
        cualquier llamada posterior con el mismo token será rechazada con 401.
        Requiere autenticación Bearer (actor USUARIO).
      responses:
        '200':
          description: Sesión cerrada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  Mensaje:
                    type: string
                    example: "OK"
        '401':
          description: No autenticado — token ausente, inválido o ya cerrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
